<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍕 Pizzería Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crust:    #1a0f00;
      --tomato:   #c0392b;
      --tomato-2: #e74c3c;
      --cheese:   #f5a623;
      --cheese-2: #ffd166;
      --basil:    #2d6a4f;
      --cream:    #fff8f0;
      --smoke:    #f0e6d3;
      --ink:      #1a0f00;
      --ink-2:    #6b4c2a;
      --ink-3:    #b8956a;
      --border:   #e8d5b7;
      --serif:    'Playfair Display', serif;
      --sans:     'DM Sans', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--crust);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--tomato), var(--cheese), var(--tomato));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .brand-logo {
      font-size: 1.6rem;
      line-height: 1;
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--cream);
      letter-spacing: -0.01em;
    }

    .brand-name span {
      color: var(--cheese);
    }

    .brand-tagline {
      font-size: 0.65rem;
      color: var(--ink-3);
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--basil);
      letter-spacing: 0.06em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--basil);
      box-shadow: 0 0 8px var(--basil);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* PROGRESS */
    .progress {
      height: 2px;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--tomato), var(--cheese));
      width: 0;
    }

    .progress-fill.active {
      animation: prog 1.5s ease-in-out infinite;
    }

    @keyframes prog {
      0% { transform: translateX(-100%); width: 60%; }
      100% { transform: translateX(200%); width: 60%; }
    }

    /* SESSION BANNER */
    .session-banner {
      background: var(--smoke);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .session-label {
      font-size: 0.68rem;
      color: var(--ink-2);
      font-family: var(--mono);
      letter-spacing: 0.06em;
    }

    .session-input {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink);
      outline: none;
      width: 180px;
      transition: border-color 0.2s;
    }

    .session-input:focus { border-color: var(--tomato); }
    .session-input::placeholder { color: var(--ink-3); }

    .btn-session {
      background: var(--tomato);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.85rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-session:hover { background: var(--tomato-2); }

    .session-active {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--basil);
      background: rgba(45, 106, 79, 0.1);
      border: 1px solid rgba(45, 106, 79, 0.3);
      border-radius: 100px;
      padding: 0.25rem 0.75rem;
    }

    /* CHAT */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.75rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      min-height: 0;
      scroll-behavior: smooth;
    }

    /* EMPTY STATE */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
      padding: 3rem;
    }

    .empty-pizza {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .empty-title {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: var(--ink);
    }

    .empty-sub {
      font-size: 0.8rem;
      color: var(--ink-2);
      max-width: 300px;
      line-height: 1.7;
    }

    .menu-hints {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .hint-chip {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 0.35rem 0.9rem;
      font-size: 0.72rem;
      color: var(--ink-2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .hint-chip:hover {
      border-color: var(--tomato);
      color: var(--tomato);
      background: rgba(192, 57, 43, 0.05);
    }

    /* MESSAGES */
    .message {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .msg-avatar.user {
      background: var(--smoke);
      border: 1.5px solid var(--border);
    }

    .msg-avatar.bot {
      background: var(--crust);
    }

    .msg-role {
      font-size: 0.65rem;
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .msg-bubble {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      border-top-left-radius: 3px;
      padding: 0.9rem 1.15rem;
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--ink);
      max-width: 680px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-items: flex-end;
    }

    .message.user .msg-header {
      flex-direction: row-reverse;
    }

    .message.user .msg-bubble {
      background: var(--crust);
      border-color: var(--crust);
      color: var(--cream);
      border-radius: 12px;
      border-top-right-radius: 3px;
      max-width: 480px;
    }

    .message.bot .msg-bubble {
      border-left: 3px solid var(--tomato);
    }

    /* TYPING */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 0.2rem 0;
    }

    .t-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--tomato);
      animation: tdot 1.2s ease-in-out infinite;
    }

    .t-dot:nth-child(2) { animation-delay: 0.2s; }
    .t-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes tdot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .error-bubble {
      background: rgba(192,57,43,0.08);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.78rem;
      color: var(--tomato);
      font-family: var(--mono);
    }

    /* INPUT */
    .input-bar {
      border-top: 1.5px solid var(--border);
      padding: 1rem 2rem;
      background: white;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .input-wrap { flex: 1; }

    textarea {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 0.88rem;
      line-height: 1.6;
      padding: 0.7rem 1rem;
      resize: none;
      height: 48px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--tomato); }
    textarea::placeholder { color: var(--ink-3); }
    textarea:disabled { opacity: 0.5; }

    .input-hint {
      font-size: 0.62rem;
      color: var(--ink-3);
      margin-top: 0.35rem;
      font-family: var(--mono);
    }

    .btn-send {
      width: 48px;
      height: 48px;
      background: var(--tomato);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-send:hover { background: var(--tomato-2); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { background: var(--border); cursor: not-allowed; }

    @media (max-width: 600px) {
      .session-banner { padding: 0.6rem 1rem; }
      .chat-area { padding: 1rem; }
      .input-bar { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">🍕</div>
    <div>
      <div class="brand-name">La <span>Bella</span> Napoli</div>
      <div class="brand-tagline">Atención al cliente · IA</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    en línea
  </div>
</header>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="session-banner" id="sessionBanner">
  <span class="session-label">tu nombre:</span>
  <input type="text" class="session-input" id="sessionInput" placeholder="ej: Juan" maxlength="30" />
  <button class="btn-session" onclick="iniciarSesion()">Iniciar chat →</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-pizza">🍕</div>
    <div class="empty-title">¡Bienvenido!</div>
    <div class="empty-sub">Ingresá tu nombre para empezar a chatear con nuestro asistente.</div>
    <div class="menu-hints">
      <div class="hint-chip" onclick="usarHint(this)">¿Qué pizzas tienen?</div>
      <div class="hint-chip" onclick="usarHint(this)">Quiero hacer un reclamo</div>
      <div class="hint-chip" onclick="usarHint(this)">¿Dónde está mi pedido?</div>
      <div class="hint-chip" onclick="usarHint(this)">Quiero un reembolso</div>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea id="inputMsg" placeholder="Escribí tu consulta..." rows="1" disabled></textarea>
    <div class="input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
  </div>
  <button class="btn-send" id="btnSend" onclick="enviar()" disabled>↑</button>
</div>

<script>
  const API = ''
  let sessionId = null

  function setLoading(v) {
    document.getElementById('progressFill').className = v ? 'progress-fill active' : 'progress-fill'
    document.getElementById('btnSend').disabled = v
    document.getElementById('inputMsg').disabled = v || !sessionId
  }

  function iniciarSesion() {
    const nombre = document.getElementById('sessionInput').value.trim()
    if (!nombre) return

    const num = Math.floor(100000 + Math.random() * 900000)
    sessionId = `${nombre}_${num}`

    const banner = document.getElementById('sessionBanner')
    banner.innerHTML = `<span class="session-active">💬 Sesión activa: ${sessionId}</span>`

    document.getElementById('inputMsg').disabled = false
    document.getElementById('btnSend').disabled = false
    document.getElementById('inputMsg').focus()

    const empty = document.getElementById('emptyState')
    if (empty) {
      empty.querySelector('.empty-title').textContent = `¡Hola, ${nombre}!`
      empty.querySelector('.empty-sub').textContent = '¿En qué te puedo ayudar hoy?'
    }
  }

  function usarHint(el) {
    if (!sessionId) {
      document.getElementById('sessionInput').focus()
      return
    }
    document.getElementById('inputMsg').value = el.textContent
    document.getElementById('inputMsg').focus()
  }

  function parseMarkdown(texto) {
    return texto
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^- (.+)$/gm, '• $1')
  }

  function addMsg(role, texto) {
    document.getElementById('emptyState')?.remove()
    const chat = document.getElementById('chatArea')
    const div = document.createElement('div')
    div.className = `message ${role}`
    const avatar = role === 'user' ? '👤' : '🍕'
    const label = role === 'user' ? 'vos' : 'la bella napoli'
    div.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar ${role}">${avatar}</div>
        <span class="msg-role">${label}</span>
      </div>
      <div class="msg-bubble">${role === 'bot' ? parseMarkdown(texto) : texto}</div>`
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
    return div
  }

  function addTyping() {
    document.getElementById('emptyState')?.remove()
    const chat = document.getElementById('chatArea')
    const div = document.createElement('div')
    div.className = 'message bot'
    div.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar bot">🍕</div>
        <span class="msg-role">escribiendo...</span>
      </div>
      <div class="msg-bubble">
        <div class="typing-dots">
          <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
        </div>
      </div>`
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
    return div
  }

  async function enviar() {
    if (!sessionId) return
    const input = document.getElementById('inputMsg')
    const texto = input.value.trim()
    if (!texto) return

    addMsg('user', texto)
    input.value = ''
    input.style.height = '48px'

    const typing = addTyping()
    setLoading(true)

    try {
      const res = await fetch(`${API}/analizar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: texto, session_id: sessionId })
      })
      if (!res.ok) throw new Error(`Error ${res.status}`)
      const data = await res.json()
      typing.remove()
      addMsg('bot', data.respuesta)
    } catch (e) {
      typing.remove()
      const chat = document.getElementById('chatArea')
      const err = document.createElement('div')
      err.className = 'error-bubble'
      err.textContent = 'No se pudo conectar con el servidor. Verificá que esté corriendo.'
      chat.appendChild(err)
      chat.scrollTop = chat.scrollHeight
    } finally {
      setLoading(false)
    }
  }

  document.getElementById('inputMsg').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar() }
  })

  document.getElementById('inputMsg').addEventListener('input', function() {
    this.style.height = '48px'
    this.style.height = Math.min(this.scrollHeight, 140) + 'px'
  })

  document.getElementById('sessionInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion()
  })
</script>
</body>
</html>
